        - Approche pédagogique centrée sur l’apprenant et l’accompagnement de tous les publics.
        - Conception de séquences pédagogiques, ingénierie de formation et animation de groupes.
        - Évaluation des compétences et adaptation des contenus selon les niveaux et besoins.
        - Maîtrise des méthodes d’andragogie et des outils d’apprentissage actifs.

    - degree: Certificat "Learning How to Learn"
      university: MOOC Coursera – University of California San Diego
      time: 2018
      details: |
        - Compréhension des mécanismes cognitifs d’apprentissage et de mémorisation.
        - Techniques d’apprentissage efficaces
        - Application de ces méthodes dans la conception de formations accessibles à tous publics.
        - Approche scientifique de la pédagogie et vulgarisation des concepts pour les apprenants.

