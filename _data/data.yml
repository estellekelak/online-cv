career-profile:
  title: Profil
  summary: |
    Je conçois, pilote et développe des projets à fort impact au croisement de la pédagogie, du financement public, du mécénat, de la communication et du numérique.
    Mon approche allie rigueur, créativité et coordination multi‑acteurs pour structurer, sécuriser et faire grandir des organisations dans des environnements complexes.

